<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Funny Fitness – Reto Familiar</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Manrope:wght@400;600;700;800&display=swap');

    * { box-sizing: border-box; }
    body { font-family: 'Manrope', sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
    h1, h2, h3, .display { font-family: 'Nunito', sans-serif; }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    @keyframes slideUp { from { transform: translateY(110%); } to { transform: translateY(0); } }
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popIn   { from { transform: scale(0.88); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes pulse   { 0%,100% { opacity: 1; } 50% { opacity: .45; } }
    @keyframes spin    { to { transform: rotate(360deg); } }

    .animate-slide-up { animation: slideUp 0.32s cubic-bezier(.22,1,.36,1); }
    .animate-fade     { animation: fadeIn  0.25s ease; }
    .animate-pop      { animation: popIn   0.28s cubic-bezier(.34,1.56,.64,1); }
    .animate-pulse-dot { animation: pulse 1.6s ease-in-out infinite; }
    .animate-spin     { animation: spin 0.9s linear infinite; }

    /* ── Phone frame ── */
    .phone-frame {
      max-width: 400px;
      width: 100%;
      margin: 0 auto;
      min-height: 100dvh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* ── Reward banner gradient ── */
    .reward-banner {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    }

    /* ── Card styles ── */
    .card { background: #fff; border-radius: 1.5rem; border: 1px solid #f1f1f4; }
    .card-sm { background: #fff; border-radius: 1rem; border: 1px solid #f1f1f4; }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: absolute;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      width: 82%;
      background: #1a1a2e;
      border-radius: 2rem;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 30;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    /* ── Overlay ── */
    .overlay-bg {
      position: absolute; inset: 0;
      background: rgba(10,10,20,0.55);
      backdrop-filter: blur(4px);
      z-index: 40;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 7rem;
      animation: fadeIn 0.2s ease;
    }
    .overlay-sheet {
      background: #fff;
      width: 100%;
      border-radius: 2rem 2rem 0 0;
      padding: 1.75rem 1.5rem 2rem;
      animation: slideUp 0.32s cubic-bezier(.22,1,.36,1);
    }

    /* ── Emoji picker grid ── */
    .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.5rem; }
    .emoji-btn  {
      font-size: 1.35rem; padding: 0.5rem;
      border-radius: 0.75rem; border: 2px solid transparent;
      cursor: pointer; transition: all 0.15s; background: #f8f8fb;
      display: flex; align-items: center; justify-content: center;
    }
    .emoji-btn:hover { background: #eeeef8; }
    .emoji-btn.selected { border-color: #4f46e5; background: #eef2ff; transform: scale(1.12); }

    /* ── Inputs ── */
    .custom-input {
      width: 100%; padding: 0.75rem 1rem;
      border: 2px solid #e5e7eb; border-radius: 0.875rem;
      font-family: 'Manrope', sans-serif; font-size: 0.875rem; font-weight: 600;
      outline: none; transition: border-color 0.15s;
      background: #fafafa;
    }
    .custom-input:focus { border-color: #4f46e5; background: #fff; }

    /* ── Rank row ── */
    .rank-row-winner { background: linear-gradient(90deg, #fef9e7 0%, #fff 100%); }
    .rank-row-loser  { background: linear-gradient(90deg, #fef2f2 0%, #fff 100%); }

    /* ── Steps bar ── */
    .steps-bar-bg { background: #f1f1f6; border-radius: 999px; height: 5px; overflow: hidden; }
    .steps-bar-fill { background: linear-gradient(90deg, #4f46e5, #a78bfa); height: 100%; border-radius: 999px; transition: width 0.6s ease; }

    /* ── Avatar bubble ── */
    .avatar-bubble {
      border-radius: 1rem; display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; background: #f4f4fb; border: 2px solid #ebebf5;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ═══════════════════════════════
   DATOS CONSTANTES
═══════════════════════════════ */

// Avatares por categoría
const AVATAR_CATEGORIES = {
  "Personas": ["👨‍🦰","👩‍🦱","👨‍💻","👩‍💻","👧","👦","👵","👴","🧑","👩","🧔","👱‍♀️","👱","🤷‍♂️","🤷‍♀️","💪","🏃‍♂️","🏃‍♀️","🧘‍♀️","🧘‍♂️"],
  "Animales": ["🦁","🐯","🐱","🐶","🦊","🐼","🐨","🦄","🐸","🐧","🦅","🦋","🐢","🦈","🦒"],
  "Deportes": ["⚽","🏀","🎾","🏊‍♂️","🚴‍♀️","🤸‍♂️","🏋️","🥊","🎯","🏄‍♂️","⛹️","🧗","🤾‍♀️","🏌️","🥋"],
  "Comida": ["🍎","🥑","🍌","🥦","🍓","🌽","🥕","🍇","🫐","🍉","🥝","🍋","🍑","🍒","🌶️"],
  "Otros": ["🚀","⭐","🔥","💎","🌈","🎸","🎮","🎨","🌸","☀️","🌙","❄️","🏔️","🌊","🦸"]
};

// Emojis para los retos
const RETO_EMOJIS = [
  "🍕","🍔","🍣","🍜","🌮","🍦","🎂","☕","🍻","🥂",
  "🎬","🎤","🎮","🎯","🎁","🛒","💆","🧖","💅","🛁",
  "🧹","🍳","🚗","✈️","🏖️","🎭","📸","🎊","🏆","💰"
];

// Retos predefinidos
const PREDEFINED_RETOS = [
  { emoji: "🍕", text: "Pagar las pizzas del viernes" },
  { emoji: "🍿", text: "Invitar al cine a todos" },
  { emoji: "🍽️", text: "Lavar los platos una semana" },
  { emoji: "☕", text: "Preparar el desayuno del domingo" },
  { emoji: "🚗", text: "Ser el chofer del grupo" },
  { emoji: "💆", text: "Pagar un masaje al ganador" },
];

// Historial de ejemplo
const HISTORY = [
  { month: "Marzo", loser: "Tío Juan", reward: "🍕 Pagó las pizzas" },
  { month: "Febrero", loser: "Abuela Betty", reward: "🍿 Invitó al cine" },
  { month: "Enero", loser: "Papá", reward: "🍽️ Lavó los platos" },
];

/* ═══════════════════════════════
   COMPONENTE PRINCIPAL
═══════════════════════════════ */
const App = () => {
  const [screen, setScreen] = useState("login"); // login | main
  const [activeTab, setActiveTab] = useState("ranking");

  // Perfil propio
  const [myProfile, setMyProfile] = useState({ name: "Mi Nombre", avatar: "🏃‍♂️" });

  // Reto activo
  const [reto, setReto] = useState({ emoji: "🍕", text: "Pagar las pizzas del viernes" });

  // Nombre del grupo
  const [groupName, setGroupName] = useState("Familia Hernández");

  // Código de grupo (simulado)
  const groupId = "FAM-7721";

  // Datos de miembros (simulado — se reemplaza por Firebase)
  const INITIAL_MEMBERS = [
    { id: "1", name: "Jorge (Papá)", steps: 45200, avatar: "👴" },
    { id: "2", name: "Elena (Mamá)", steps: 31200, avatar: "👵" },
    { id: "3", name: "Sofía", steps: 12500, avatar: "👧" },
    { id: "me", name: myProfile.name, steps: 28400, avatar: myProfile.avatar },
  ];
  const [members, setMembers] = useState(INITIAL_MEMBERS);

  const resetRanking = () => {
    setMembers(prev => prev.map(m => ({ ...m, steps: 0 })));
    setOverlay(null);
  };

  const sortedMembers = [...members]
    .map(m => m.id === "me" ? { ...m, name: myProfile.name, avatar: myProfile.avatar } : m)
    .sort((a, b) => b.steps - a.steps);

  // Overlays
  const [overlay, setOverlay] = useState(null);
  // overlay: null | "quickActions" | "editReto" | "editProfile" | "editAvatar" | "confirmReset"

  const maxSteps = sortedMembers[0]?.steps || 1;

  // ── Handlers ──
  const closeOverlay = () => setOverlay(null);

  const sendWhatsApp = () => {
    const link = `https://funny-fitness.netlify.app/?join=${groupId}`;
    const msg  = `¡Te invito a unirte a Funny Fitness! 🏃‍♂️\n\nMovámonos juntos, mejoremos nuestra salud y divirtámonos compitiendo con familia o amigos.\n\nÚnete aquí: ${link}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, "_blank");
  };

  /* ════════════ LOGIN ════════════ */
  if (screen === "login") return (
    <div className="phone-frame" style={{ justifyContent: "center", alignItems: "center", padding: "2.5rem 2rem", gap: "2rem" }}>
      <div style={{ textAlign: "center" }}>
        <div style={{ width: 88, height: 88, background: "linear-gradient(135deg,#4f46e5,#7c3aed)", borderRadius: "2rem", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 1.25rem", fontSize: "2.5rem", boxShadow: "0 12px 40px rgba(79,70,229,0.3)" }}>
          🔥
        </div>
        <h1 style={{ fontSize: "2.8rem", fontWeight: 900, color: "#1a1a2e", letterSpacing: "-1px", margin: 0 }}>Funny Fitness</h1>
        <p style={{ color: "#9ca3af", fontWeight: 700, fontSize: "0.7rem", letterSpacing: "0.18em", textTransform: "uppercase", marginTop: "0.5rem" }}>Movámonos juntos</p>
      </div>

      <div style={{ width: "100%", display: "flex", flexDirection: "column", gap: "0.75rem" }}>
        <button
          onClick={() => setScreen("main")}
          style={{ width: "100%", padding: "1.1rem", background: "linear-gradient(135deg,#4f46e5,#7c3aed)", color: "#fff", borderRadius: "1.25rem", border: "none", fontFamily: "'Nunito',sans-serif", fontWeight: 900, fontSize: "0.95rem", letterSpacing: "0.06em", cursor: "pointer", boxShadow: "0 6px 24px rgba(79,70,229,0.28)" }}
        >
          Entrar al Ranking
        </button>
        <button
          onClick={() => setScreen("main")}
          style={{ width: "100%", padding: "1.1rem", background: "#f8f8fb", color: "#4f46e5", borderRadius: "1.25rem", border: "2px solid #e8e8f5", fontFamily: "'Nunito',sans-serif", fontWeight: 900, fontSize: "0.95rem", cursor: "pointer" }}
        >
          🔗 Tengo un código de invitación
        </button>
      </div>

      <p style={{ fontSize: "0.7rem", color: "#d1d5db", fontWeight: 600, textAlign: "center" }}>
        Sin tarjeta de crédito · Gratis para empezar
      </p>
    </div>
  );

  /* ════════════ RANKING TAB ════════════ */
  const RankingTab = () => (
    <div style={{ padding: "1rem", display: "flex", flexDirection: "column", gap: "1rem" }}>

      {/* Banner reto */}
      <div className="reward-banner" style={{ borderRadius: "1.75rem", padding: "1.4rem 1.5rem", color: "#fff", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "relative", zIndex: 1 }}>
          <p style={{ fontSize: "0.6rem", fontWeight: 800, letterSpacing: "0.18em", textTransform: "uppercase", opacity: 0.7, margin: "0 0 0.35rem" }}>Reto de la semana</p>
          <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
            <span style={{ fontSize: "1.8rem" }}>{reto.emoji}</span>
            <h2 style={{ fontSize: "1.15rem", fontWeight: 900, margin: 0, lineHeight: 1.25 }}>{reto.text}</h2>
          </div>
          <div style={{ marginTop: "1rem", display: "flex", gap: "0.5rem" }}>
            <span style={{ background: "rgba(255,255,255,0.2)", padding: "0.3rem 0.8rem", borderRadius: "999px", fontSize: "0.65rem", fontWeight: 700 }}>
              ❤️ Salud familiar
            </span>
            <span style={{ background: "rgba(255,255,255,0.2)", padding: "0.3rem 0.8rem", borderRadius: "999px", fontSize: "0.65rem", fontWeight: 700 }}>
              4 días restantes
            </span>
          </div>
        </div>
        <div style={{ position: "absolute", right: -20, bottom: -20, fontSize: "7rem", opacity: 0.1, transform: "rotate(12deg)" }}>⚡</div>
      </div>

      {/* Historial scroll horizontal */}
      <div style={{ overflowX: "auto", display: "flex", gap: "0.75rem", paddingBottom: "0.25rem" }} className="scrollbar-hide">
        {HISTORY.map((h, i) => (
          <div key={i} className="card-sm" style={{ flexShrink: 0, padding: "0.75rem 1rem", display: "flex", alignItems: "center", gap: "0.75rem", minWidth: 170 }}>
            <div style={{ background: "#fef2f2", padding: "0.5rem", borderRadius: "0.75rem", fontSize: "1.2rem" }}>{h.reward.split(" ")[0]}</div>
            <div>
              <p style={{ fontSize: "0.6rem", fontWeight: 800, color: "#9ca3af", textTransform: "uppercase", letterSpacing: "0.1em", margin: 0 }}>{h.month}</p>
              <p style={{ fontSize: "0.75rem", fontWeight: 700, color: "#1a1a2e", margin: "0.1rem 0 0" }}>{h.loser} perdió</p>
              <p style={{ fontSize: "0.65rem", color: "#9ca3af", margin: 0 }}>{h.reward.replace(/^[^\s]+\s/,"")}</p>
            </div>
          </div>
        ))}
      </div>

      {/* Tabla de ranking */}
      <div className="card" style={{ padding: "0.25rem" }}>
        <div style={{ padding: "1rem 1.25rem 0.75rem", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid #f1f1f4" }}>
          <h3 style={{ fontWeight: 800, color: "#1a1a2e", fontSize: "0.8rem", textTransform: "uppercase", letterSpacing: "0.1em", margin: 0 }}>Clasificación</h3>
          <span style={{ fontSize: "0.6rem", fontWeight: 800, color: "#10b981", background: "#f0fdf4", padding: "0.3rem 0.7rem", borderRadius: "0.5rem", letterSpacing: "0.1em", textTransform: "uppercase", display: "flex", alignItems: "center", gap: "0.3rem" }}>
            <span className="animate-pulse-dot" style={{ width: 6, height: 6, background: "#10b981", borderRadius: "50%", display: "inline-block" }}></span>
            En vivo
          </span>
        </div>

        {sortedMembers.map((m, i) => {
          const isWinner = i === 0;
          const isLoser  = i === sortedMembers.length - 1;
          const isMe     = m.id === "me";
          const pct = Math.round((m.steps / maxSteps) * 100);

          return (
            <div key={m.id} className={isWinner ? "rank-row-winner" : isLoser ? "rank-row-loser" : ""}
              style={{ padding: "0.85rem 1.25rem", display: "flex", alignItems: "center", gap: "0.85rem", borderBottom: i < sortedMembers.length - 1 ? "1px solid #f8f8fb" : "none", borderRadius: i === sortedMembers.length - 1 ? "0 0 1.5rem 1.5rem" : 0 }}
            >
              {/* Posición */}
              <span style={{ fontWeight: 900, fontSize: "0.85rem", width: 20, textAlign: "center", flexShrink: 0, color: isWinner ? "#f59e0b" : isLoser ? "#ef4444" : "#d1d5db" }}>
                {isWinner ? "🥇" : isLoser ? "💀" : i + 1}
              </span>

              {/* Avatar */}
              <div className="avatar-bubble" style={{ width: 44, height: 44, border: isMe ? "2px solid #4f46e5" : undefined }}>
                {m.avatar}
              </div>

              {/* Nombre + barra */}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.3rem" }}>
                  <p style={{ fontWeight: 700, fontSize: "0.8rem", color: isMe ? "#4f46e5" : "#1a1a2e", margin: 0, truncate: true }}>
                    {m.name}{isMe ? " (Tú)" : ""}
                  </p>
                  <p style={{ fontWeight: 800, fontSize: "0.85rem", color: "#1a1a2e", margin: 0 }}>
                    {m.steps.toLocaleString()}
                  </p>
                </div>
                <div className="steps-bar-bg">
                  <div className="steps-bar-fill" style={{ width: `${pct}%`, background: isLoser ? "linear-gradient(90deg,#ef4444,#fca5a5)" : undefined }}></div>
                </div>
                {isLoser && <p style={{ fontSize: "0.6rem", fontWeight: 800, color: "#ef4444", textTransform: "uppercase", letterSpacing: "0.08em", margin: "0.2rem 0 0" }}>
                  ⚠️ {reto.emoji} ¡Esta semana paga!
                </p>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );

  /* ════════════ SETTINGS TAB ════════════ */
  const SettingsTab = () => (
    <div style={{ padding: "1rem", display: "flex", flexDirection: "column", gap: "1rem" }}>

      <h2 style={{ fontWeight: 900, fontSize: "1.4rem", color: "#1a1a2e", margin: "0.25rem 0 0.5rem" }}>Ajustes</h2>

      {/* Mi perfil */}
      <div className="card" style={{ padding: "1.25rem" }}>
        <p style={{ fontSize: "0.6rem", fontWeight: 800, color: "#9ca3af", textTransform: "uppercase", letterSpacing: "0.12em", margin: "0 0 0.75rem" }}>Mi perfil</p>
        <div style={{ display: "flex", alignItems: "center", gap: "1rem" }}>
          <button onClick={() => setOverlay("editAvatar")} style={{ position: "relative", background: "none", border: "none", cursor: "pointer" }}>
            <div className="avatar-bubble" style={{ width: 56, height: 56, border: "2px solid #e8e8f5" }}>{myProfile.avatar}</div>
            <div style={{ position: "absolute", bottom: -2, right: -2, background: "#4f46e5", borderRadius: "50%", width: 18, height: 18, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "0.6rem" }}>✏️</div>
          </button>
          <div style={{ flex: 1 }}>
            <p style={{ fontSize: "0.65rem", fontWeight: 700, color: "#9ca3af", margin: "0 0 0.25rem" }}>Nombre en el grupo</p>
            <button onClick={() => setOverlay("editProfile")} style={{ background: "#f8f8fb", border: "2px solid #e8e8f5", borderRadius: "0.75rem", padding: "0.5rem 0.875rem", fontFamily: "'Manrope',sans-serif", fontWeight: 700, fontSize: "0.875rem", color: "#1a1a2e", cursor: "pointer", width: "100%", textAlign: "left", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span>{myProfile.name}</span>
              <span style={{ color: "#4f46e5", fontSize: "0.75rem" }}>Editar →</span>
            </button>
          </div>
        </div>
      </div>

      {/* Reto de la semana */}
      <div className="card" style={{ padding: "1.25rem" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.75rem" }}>
          <p style={{ fontSize: "0.6rem", fontWeight: 800, color: "#9ca3af", textTransform: "uppercase", letterSpacing: "0.12em", margin: 0 }}>Reto del mes</p>
          <button onClick={() => setOverlay("editReto")} style={{ background: "#eef2ff", color: "#4f46e5", border: "none", borderRadius: "0.6rem", padding: "0.3rem 0.75rem", fontFamily: "'Manrope',sans-serif", fontWeight: 700, fontSize: "0.7rem", cursor: "pointer" }}>
            ✏️ Editar
          </button>
        </div>
        <div style={{ background: "#f8f8fb", borderRadius: "1rem", padding: "1rem", display: "flex", alignItems: "center", gap: "0.75rem", border: "2px solid #e8e8f5" }}>
          <span style={{ fontSize: "2rem" }}>{reto.emoji}</span>
          <p style={{ fontWeight: 700, fontSize: "0.875rem", color: "#1a1a2e", margin: 0 }}>{reto.text}</p>
        </div>
      </div>

      {/* Invitar por WhatsApp */}
      <div style={{ background: "linear-gradient(135deg,#e7f9ee,#d1f2de)", borderRadius: "1.5rem", padding: "1.25rem", border: "2px solid #bbf0d0" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "0.75rem", marginBottom: "0.75rem" }}>
          <div style={{ background: "#25d366", borderRadius: "0.875rem", padding: "0.6rem", fontSize: "1.1rem" }}>💬</div>
          <div>
            <p style={{ fontWeight: 800, color: "#075e54", fontSize: "0.8rem", margin: 0 }}>Invitar por WhatsApp</p>
            <p style={{ color: "#1a7c4e", fontSize: "0.65rem", fontWeight: 600, margin: 0 }}>Manda el link del grupo automáticamente</p>
          </div>
        </div>
        <button onClick={sendWhatsApp} style={{ width: "100%", background: "#25d366", color: "#fff", border: "none", borderRadius: "1rem", padding: "0.9rem", fontFamily: "'Nunito',sans-serif", fontWeight: 900, fontSize: "0.85rem", cursor: "pointer", boxShadow: "0 4px 16px rgba(37,211,102,0.3)" }}>
          📤 Enviar invitación
        </button>
      </div>

      {/* Código de grupo */}
      <div className="card" style={{ padding: "1.25rem", textAlign: "center" }}>
        <p style={{ fontSize: "0.6rem", fontWeight: 800, color: "#9ca3af", textTransform: "uppercase", letterSpacing: "0.15em", margin: "0 0 0.5rem" }}>Código del grupo</p>
        <p style={{ fontFamily: "monospace", fontWeight: 900, fontSize: "1.75rem", color: "#1a1a2e", letterSpacing: "0.25em", margin: 0 }}>{groupId}</p>
        <p style={{ fontSize: "0.65rem", color: "#9ca3af", fontWeight: 600, marginTop: "0.4rem" }}>Compártelo para que otros se unan</p>
      </div>

      {/* Reiniciar ranking */}
      <div style={{ background: "#fff5f5", borderRadius: "1.5rem", padding: "1.25rem", border: "2px solid #fee2e2" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "0.75rem", marginBottom: "0.75rem" }}>
          <div style={{ background: "#ef4444", borderRadius: "0.875rem", padding: "0.6rem", fontSize: "1.1rem" }}>🔄</div>
          <div>
            <p style={{ fontWeight: 800, color: "#991b1b", fontSize: "0.8rem", margin: 0 }}>Nueva semana / Nueva temporada</p>
            <p style={{ color: "#b91c1c", fontSize: "0.65rem", fontWeight: 600, margin: 0 }}>Reinicia todos los pasos a cero</p>
          </div>
        </div>
        <button onClick={() => setOverlay("confirmReset")} style={{ width: "100%", background: "#ef4444", color: "#fff", border: "none", borderRadius: "1rem", padding: "0.9rem", fontFamily: "'Nunito',sans-serif", fontWeight: 900, fontSize: "0.85rem", cursor: "pointer", boxShadow: "0 4px 16px rgba(239,68,68,0.25)" }}>
          🗑 Limpiar ranking y empezar de cero
        </button>
      </div>

    </div>
  );

  /* ════════════ OVERLAY: EDITAR RETO ════════════ */
  const EditRetoOverlay = () => {
    const [localEmoji, setLocalEmoji] = useState(reto.emoji);
    const [localText,  setLocalText]  = useState(reto.text);
    const [emojiTab,   setEmojiTab]   = useState(false);

    return (
      <div className="overlay-bg" onClick={closeOverlay}>
        <div className="overlay-sheet" onClick={e => e.stopPropagation()} style={{ maxHeight: "88dvh", overflowY: "auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1.25rem" }}>
            <h3 style={{ fontWeight: 900, fontSize: "1.15rem", color: "#1a1a2e", margin: 0 }}>Editar reto</h3>
            <button onClick={closeOverlay} style={{ background: "#f1f1f4", border: "none", borderRadius: "50%", width: 32, height: 32, cursor: "pointer", fontSize: "1rem" }}>✕</button>
          </div>

          {/* Retos predefinidos */}
          <p style={{ fontSize: "0.6rem", fontWeight: 800, color: "#9ca3af", textTransform: "uppercase", letterSpacing: "0.12em", margin: "0 0 0.5rem" }}>Retos rápidos</p>
          <div style={{ display: "flex", flexDirection: "column", gap: "0.4rem", marginBottom: "1.25rem" }}>
            {PREDEFINED_RETOS.map((r, i) => (
              <button key={i} onClick={() => { setLocalEmoji(r.emoji); setLocalText(r.text); }}
                style={{ background: localText === r.text ? "#eef2ff" : "#f8f8fb", border: `2px solid ${localText === r.text ? "#4f46e5" : "transparent"}`, borderRadius: "0.875rem", padding: "0.75rem 1rem", textAlign: "left", cursor: "pointer", display: "flex", alignItems: "center", gap: "0.75rem", fontFamily: "'Manrope',sans-serif" }}>
                <span style={{ fontSize: "1.25rem" }}>{r.emoji}</span>
                <span style={{ fontWeight: 600, fontSize: "0.8rem", color: "#1a1a2e" }}>{r.text}</span>
              </button>
            ))}
          </div>

          {/* Personalizado */}
          <p style={{ fontSize: "0.6rem", fontWeight: 800, color: "#9ca3af", textTransform: "uppercase", letterSpacing: "0.12em", margin: "0 0 0.5rem" }}>O escribe el tuyo</p>
          
          {/* Emoji selector */}
          <div style={{ marginBottom: "0.75rem" }}>
            <button onClick={() => setEmojiTab(!emojiTab)}
              style={{ background: "#f8f8fb", border: "2px solid #e8e8f5", borderRadius: "0.875rem", padding: "0.6rem 1rem", cursor: "pointer", display: "flex", alignItems: "center", gap: "0.75rem", fontFamily: "'Manrope',sans-serif", fontWeight: 700, fontSize: "0.8rem", color: "#4f46e5" }}>
              <span style={{ fontSize: "1.5rem" }}>{localEmoji}</span>
              <span>{emojiTab ? "▲ Cerrar emojis" : "▼ Cambiar emoji del reto"}</span>
            </button>
            {emojiTab && (
              <div className="animate-pop" style={{ background: "#f8f8fb", borderRadius: "1rem", padding: "0.875rem", marginTop: "0.5rem", border: "2px solid #e8e8f5" }}>
                <div className="emoji-grid">
                  {RETO_EMOJIS.map(em => (
                    <button key={em} className={`emoji-btn${localEmoji === em ? " selected" : ""}`} onClick={() => setLocalEmoji(em)}>{em}</button>
                  ))}
                </div>
              </div>
            )}
          </div>

          <input className="custom-input" value={localText} onChange={e => setLocalText(e.target.value)}
            placeholder="Ej: Pagar la cena del sábado..." style={{ marginBottom: "1.25rem" }} />

          {/* Preview */}
          <div style={{ background: "linear-gradient(135deg,#4f46e5,#7c3aed)", borderRadius: "1.25rem", padding: "1rem 1.25rem", color: "#fff", marginBottom: "1.25rem", display: "flex", alignItems: "center", gap: "0.75rem" }}>
            <span style={{ fontSize: "1.75rem" }}>{localEmoji}</span>
            <div>
              <p style={{ fontSize: "0.6rem", opacity: 0.7, margin: "0 0 0.2rem", textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 700 }}>Vista previa</p>
              <p style={{ fontWeight: 900, fontSize: "0.9rem", margin: 0 }}>{localText || "Tu reto aquí..."}</p>
            </div>
          </div>

          <button onClick={() => { setReto({ emoji: localEmoji, text: localText }); closeOverlay(); }}
            disabled={!localText.trim()}
            style={{ width: "100%", background: localText.trim() ? "linear-gradient(135deg,#4f46e5,#7c3aed)" : "#e5e7eb", color: localText.trim() ? "#fff" : "#9ca3af", border: "none", borderRadius: "1rem", padding: "1rem", fontFamily: "'Nunito',sans-serif", fontWeight: 900, fontSize: "0.95rem", cursor: localText.trim() ? "pointer" : "not-allowed", letterSpacing: "0.05em" }}>
            ✓ Guardar reto
          </button>
        </div>
      </div>
    );
  };

  /* ════════════ OVERLAY: EDITAR NOMBRE ════════════ */
  const EditProfileOverlay = () => {
    const [localName, setLocalName] = useState(myProfile.name);
    return (
      <div className="overlay-bg" onClick={closeOverlay}>
        <div className="overlay-sheet" onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1.25rem" }}>
            <h3 style={{ fontWeight: 900, fontSize: "1.15rem", color: "#1a1a2e", margin: 0 }}>Tu nombre</h3>
            <button onClick={closeOverlay} style={{ background: "#f1f1f4", border: "none", borderRadius: "50%", width: 32, height: 32, cursor: "pointer" }}>✕</button>
          </div>
          <p style={{ fontSize: "0.75rem", color: "#9ca3af", fontWeight: 600, marginBottom: "0.75rem" }}>Así te verán los demás en el ranking</p>
          <input className="custom-input" value={localName} onChange={e => setLocalName(e.target.value)} placeholder="Tu nombre..." style={{ marginBottom: "1rem" }} autoFocus />
          <button onClick={() => { setMyProfile(p => ({...p, name: localName})); closeOverlay(); }}
            disabled={!localName.trim()}
            style={{ width: "100%", background: "#4f46e5", color: "#fff", border: "none", borderRadius: "1rem", padding: "1rem", fontFamily: "'Nunito',sans-serif", fontWeight: 900, fontSize: "0.95rem", cursor: "pointer" }}>
            ✓ Guardar
          </button>
        </div>
      </div>
    );
  };

  /* ════════════ OVERLAY: EDITAR AVATAR ════════════ */
  const EditAvatarOverlay = () => {
    const [cat, setCat] = useState("Personas");
    const [localAv, setLocalAv] = useState(myProfile.avatar);
    return (
      <div className="overlay-bg" onClick={closeOverlay}>
        <div className="overlay-sheet" onClick={e => e.stopPropagation()} style={{ maxHeight: "88dvh", overflowY: "auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem" }}>
            <h3 style={{ fontWeight: 900, fontSize: "1.15rem", color: "#1a1a2e", margin: 0 }}>Elige tu avatar</h3>
            <button onClick={closeOverlay} style={{ background: "#f1f1f4", border: "none", borderRadius: "50%", width: 32, height: 32, cursor: "pointer" }}>✕</button>
          </div>

          {/* Categorías */}
          <div style={{ display: "flex", gap: "0.4rem", overflowX: "auto", paddingBottom: "0.5rem", marginBottom: "0.875rem" }} className="scrollbar-hide">
            {Object.keys(AVATAR_CATEGORIES).map(c => (
              <button key={c} onClick={() => setCat(c)}
                style={{ flexShrink: 0, padding: "0.4rem 0.9rem", borderRadius: "999px", border: "2px solid", borderColor: cat === c ? "#4f46e5" : "#e8e8f5", background: cat === c ? "#eef2ff" : "#f8f8fb", color: cat === c ? "#4f46e5" : "#9ca3af", fontFamily: "'Manrope',sans-serif", fontWeight: 700, fontSize: "0.7rem", cursor: "pointer" }}>
                {c}
              </button>
            ))}
          </div>

          {/* Grid de avatares */}
          <div className="emoji-grid" style={{ marginBottom: "1.25rem" }}>
            {AVATAR_CATEGORIES[cat].map(av => (
              <button key={av} className={`emoji-btn${localAv === av ? " selected" : ""}`} onClick={() => setLocalAv(av)}>{av}</button>
            ))}
          </div>

          {/* Preview */}
          <div style={{ display: "flex", alignItems: "center", gap: "1rem", background: "#f8f8fb", borderRadius: "1rem", padding: "0.875rem 1rem", marginBottom: "1.25rem", border: "2px solid #e8e8f5" }}>
            <div className="avatar-bubble" style={{ width: 52, height: 52, border: "2px solid #4f46e5" }}>{localAv}</div>
            <div>
              <p style={{ fontSize: "0.65rem", color: "#9ca3af", fontWeight: 700, margin: "0 0 0.2rem" }}>Vista previa</p>
              <p style={{ fontWeight: 800, fontSize: "0.85rem", color: "#1a1a2e", margin: 0 }}>{myProfile.name}</p>
            </div>
          </div>

          <button onClick={() => { setMyProfile(p => ({...p, avatar: localAv})); closeOverlay(); }}
            style={{ width: "100%", background: "#4f46e5", color: "#fff", border: "none", borderRadius: "1rem", padding: "1rem", fontFamily: "'Nunito',sans-serif", fontWeight: 900, fontSize: "0.95rem", cursor: "pointer" }}>
            ✓ Usar este avatar
          </button>
        </div>
      </div>
    );
  };

  /* ════════════ OVERLAY: CONFIRMAR RESET ════════════ */
  const ConfirmResetOverlay = () => (
    <div className="overlay-bg" onClick={closeOverlay}>
      <div className="overlay-sheet" onClick={e => e.stopPropagation()}>
        <div style={{ textAlign: "center", marginBottom: "1.5rem" }}>
          <div style={{ fontSize: "3rem", marginBottom: "0.75rem" }}>⚠️</div>
          <h3 style={{ fontWeight: 900, fontSize: "1.15rem", color: "#1a1a2e", margin: "0 0 0.5rem" }}>¿Reiniciar el ranking?</h3>
          <p style={{ fontSize: "0.8rem", color: "#6b7280", fontWeight: 600, lineHeight: 1.5, margin: 0 }}>
            Esto pondrá todos los pasos en cero y empezará una nueva competencia. El historial anterior se guarda.
          </p>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: "0.6rem" }}>
          <button onClick={resetRanking}
            style={{ width: "100%", background: "#ef4444", color: "#fff", border: "none", borderRadius: "1rem", padding: "1rem", fontFamily: "'Nunito',sans-serif", fontWeight: 900, fontSize: "0.95rem", cursor: "pointer", boxShadow: "0 4px 16px rgba(239,68,68,0.25)" }}>
            ✓ Sí, limpiar y empezar de nuevo
          </button>
          <button onClick={closeOverlay}
            style={{ width: "100%", background: "#f8f8fb", color: "#6b7280", border: "2px solid #e8e8f5", borderRadius: "1rem", padding: "1rem", fontFamily: "'Nunito',sans-serif", fontWeight: 900, fontSize: "0.95rem", cursor: "pointer" }}>
            Cancelar
          </button>
        </div>
      </div>
    </div>
  );

  /* ════════════ OVERLAY: ACCIONES RÁPIDAS ════════════ */
  const QuickActionsOverlay = () => {
    const [syncing, setSyncing] = useState(false);
    const sync = () => { setSyncing(true); setTimeout(() => { setSyncing(false); closeOverlay(); }, 1400); };
    return (
      <div className="overlay-bg" onClick={closeOverlay}>
        <div className="overlay-sheet" onClick={e => e.stopPropagation()}>
          <h3 style={{ fontWeight: 900, fontSize: "1.1rem", color: "#1a1a2e", textAlign: "center", margin: "0 0 1.25rem" }}>Acciones rápidas</h3>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: "0.75rem" }}>
            {[
              { bg: "#eef2ff", icon: syncing ? "⏳" : "🔄", label: "Sincronizar", color: "#4f46e5", action: sync },
              { bg: "#fff7ed", icon: "💬",  label: "Piqué",     color: "#ea580c", action: closeOverlay },
              { bg: "#f0fdf4", icon: "👋",  label: "Invitar",   color: "#16a34a", action: () => { closeOverlay(); setActiveTab("settings"); } },
            ].map((a, i) => (
              <button key={i} onClick={a.action}
                style={{ background: a.bg, border: "2px solid transparent", borderRadius: "1.25rem", padding: "1rem 0.5rem", display: "flex", flexDirection: "column", alignItems: "center", gap: "0.4rem", cursor: "pointer" }}>
                <div style={{ background: a.color, borderRadius: "0.875rem", padding: "0.75rem", fontSize: "1.2rem" }}>{a.icon}</div>
                <span style={{ fontSize: "0.65rem", fontWeight: 800, color: a.color, textTransform: "uppercase", letterSpacing: "0.08em" }}>{a.label}</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  };

  /* ════════════ MAIN RENDER ════════════ */
  return (
    <div className="phone-frame">
      {/* Header */}
      <header style={{ padding: "1rem 1.25rem", background: "#fff", borderBottom: "1px solid #f1f1f4", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0, zIndex: 10 }}>
        <div>
          <h1 style={{ fontWeight: 900, fontSize: "1.1rem", color: "#1a1a2e", margin: 0 }}>{groupName}</h1>
          <p style={{ fontSize: "0.6rem", fontWeight: 800, color: "#10b981", textTransform: "uppercase", letterSpacing: "0.12em", margin: 0, display: "flex", alignItems: "center", gap: "0.3rem" }}>
            <span className="animate-pulse-dot" style={{ width: 5, height: 5, background: "#10b981", borderRadius: "50%", display: "inline-block" }}></span>
            Sincronizado
          </p>
        </div>
        <button style={{ background: "#f8f8fb", border: "2px solid #e8e8f5", borderRadius: "0.875rem", width: 38, height: 38, cursor: "pointer", fontSize: "1rem" }}>🔔</button>
      </header>

      {/* Contenido scrolleable */}
      <main style={{ flex: 1, overflowY: "auto", paddingBottom: "7rem" }} className="scrollbar-hide">
        {activeTab === "ranking" ? <RankingTab /> : <SettingsTab />}
      </main>

      {/* Overlays */}
      {overlay === "editReto"      && <EditRetoOverlay />}
      {overlay === "editProfile"   && <EditProfileOverlay />}
      {overlay === "editAvatar"    && <EditAvatarOverlay />}
      {overlay === "quickActions"  && <QuickActionsOverlay />}
      {overlay === "confirmReset"  && <ConfirmResetOverlay />}

      {/* Bottom Nav */}
      <nav className="bottom-nav">
        <button onClick={() => setActiveTab("ranking")}
          style={{ background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: "0.25rem", opacity: activeTab === "ranking" ? 1 : 0.4, transition: "opacity 0.2s" }}>
          <span style={{ fontSize: "1.35rem" }}>🏆</span>
          <span style={{ fontSize: "0.55rem", fontWeight: 800, color: activeTab === "ranking" ? "#a5b4fc" : "#6b7280", textTransform: "uppercase", letterSpacing: "0.08em" }}>Ranking</span>
        </button>

        {/* Botón central flotante */}
        <div style={{ position: "relative" }}>
          <div style={{ position: "absolute", bottom: "1.5rem", left: "50%", transform: "translateX(-50%)", background: "#fff", borderRadius: "50%", padding: "0.3rem", boxShadow: "0 6px 24px rgba(0,0,0,0.15)" }}>
            <button onClick={() => setOverlay("quickActions")}
              style={{ background: "linear-gradient(135deg,#4f46e5,#7c3aed)", border: "none", borderRadius: "50%", width: 54, height: 54, cursor: "pointer", fontSize: "1.5rem", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 4px 18px rgba(79,70,229,0.4)" }}>
              🔥
            </button>
          </div>
        </div>

        <button onClick={() => setActiveTab("settings")}
          style={{ background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: "0.25rem", opacity: activeTab === "settings" ? 1 : 0.4, transition: "opacity 0.2s" }}>
          <span style={{ fontSize: "1.35rem" }}>⚙️</span>
          <span style={{ fontSize: "0.55rem", fontWeight: 800, color: activeTab === "settings" ? "#a5b4fc" : "#6b7280", textTransform: "uppercase", letterSpacing: "0.08em" }}>Ajustes</span>
        </button>
      </nav>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
