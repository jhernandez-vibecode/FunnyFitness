<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funny Fitness - App Familiar</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para procesar JSX en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONOS (Usando SVGs inline para máxima compatibilidad en 1 solo archivo) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('ranking');
            const [showQuickActions, setShowQuickActions] = useState(false);
            const [showInviteModal, setShowInviteModal] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [groupName, setGroupName] = useState('Funny Fitness');
            const [activeReward, setActiveReward] = useState('Pagar las Pizzas 🍕');
            const [myProfile, setMyProfile] = useState({ name: 'Usuario Nuevo', avatar: '👤' });

            const familyMembers = [
                { id: '1', name: 'Papá (Jorge)', steps: 45200, avatar: '👴' },
                { id: '2', name: 'Mamá (Elena)', steps: 31200, avatar: '👵' },
                { id: '3', name: 'Sofía', steps: 12500, avatar: '👧' },
                { id: 'me', name: 'Tú', steps: 28400, avatar: '👤' }
            ].sort((a, b) => b.steps - a.steps);

            const history = [
                { month: 'Febrero', loser: 'Tío Juan' },
                { month: 'Enero', loser: 'Papá' }
            ];

            useEffect(() => {
                // Inicializar iconos de Lucide después del renderizado
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            const handleSync = () => {
                setIsSyncing(true);
                setTimeout(() => {
                    setIsSyncing(false);
                    setShowQuickActions(false);
                }, 2000);
            };

            const renderRanking = () => (
                <div className="flex flex-col space-y-4 p-4 animate-in fade-in duration-500">
                    <div className="bg-indigo-600 rounded-[2.5rem] p-6 text-white shadow-xl relative overflow-hidden">
                        <div className="relative z-10">
                            <p className="text-[10px] font-black uppercase tracking-widest opacity-70">Reto en curso</p>
                            <h2 className="text-2xl font-black mt-1">{activeReward}</h2>
                            <div className="mt-4 flex items-center bg-white/20 w-fit px-3 py-1 rounded-full text-[10px] font-bold">
                                <span>EL ÚLTIMO PAGA LA CUENTA 🍕</span>
                            </div>
                        </div>
                        <Icon name="flame" size={150} className="absolute -right-10 -bottom-10 opacity-10 rotate-12" />
                    </div>

                    <div className="flex space-x-3 overflow-x-auto pb-2 scrollbar-hide">
                        {history.map((h, i) => (
                            <div key={i} className="flex-shrink-0 bg-white border border-gray-100 rounded-2xl p-3 flex items-center space-x-3 shadow-sm">
                                <div className="text-xl">🍕</div>
                                <div>
                                    <p className="text-[9px] font-black text-gray-400 uppercase">{h.month}</p>
                                    <p className="text-xs font-black text-gray-800">{h.loser} pagó</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="bg-white rounded-[2rem] p-2 shadow-sm border border-gray-50">
                        <div className="p-4 flex justify-between items-center border-b border-gray-50 mb-2">
                            <h3 className="font-black text-gray-800 text-sm uppercase flex items-center">
                                <Icon name="trophy" size={16} className="mr-2 text-yellow-500" /> Clasificación
                            </h3>
                            <span className="text-[10px] font-bold text-green-500 bg-green-50 px-2 py-1 rounded-lg uppercase">En vivo</span>
                        </div>
                        {familyMembers.map((m, i) => (
                            <div key={m.id} className={`flex items-center justify-between p-4 rounded-2xl mb-1 ${i === 0 ? 'bg-yellow-50/50' : i === familyMembers.length - 1 ? 'bg-red-50/50' : ''}`}>
                                <div className="flex items-center space-x-4 min-w-0">
                                    <span className={`text-xs font-black w-4 text-center ${i === 0 ? 'text-yellow-600' : 'text-gray-300'}`}>{i + 1}</span>
                                    <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-2xl shadow-sm border border-gray-100">{m.avatar}</div>
                                    <div className="min-w-0 flex-1">
                                        <p className="font-bold text-gray-800 text-sm truncate">{m.name}</p>
                                        <p className={`text-[10px] font-black uppercase ${i === familyMembers.length - 1 ? 'text-red-500' : 'text-gray-400'}`}>
                                            {i === familyMembers.length - 1 ? '¡Paga el almuerzo! 😱' : '¡Muy bien! 💪'}
                                        </p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="text-base font-black text-gray-900 leading-none">{m.steps.toLocaleString()}</p>
                                    <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Pasos</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const renderSettings = () => (
                <div className="p-6 space-y-6">
                    <h2 className="text-2xl font-black text-gray-900">Ajustes</h2>
                    <div className="bg-[#E7F9EE] p-6 rounded-[2.5rem] border-2 border-[#D1F2DE] space-y-4">
                        <div className="flex items-center space-x-3">
                            <Icon name="message-circle" className="text-[#25D366]" />
                            <h3 className="font-black text-[#075E54] text-sm uppercase tracking-wider">Invitar a la Familia</h3>
                        </div>
                        <button 
                            onClick={() => window.open('https://wa.me/?text=¡Únete a Funny Fitness!', '_blank')}
                            className="w-full bg-[#25D366] text-white font-black py-4 rounded-2xl text-xs uppercase shadow-xl active:scale-95 transition-transform"
                        >
                            Invitar por WhatsApp
                        </button>
                    </div>
                    <div className="bg-white p-5 rounded-[2rem] border border-gray-100 text-center">
                        <p className="text-gray-400 text-xs font-bold uppercase">Nombre del Grupo</p>
                        <p className="text-xl font-black text-gray-800 mt-1">{groupName}</p>
                    </div>
                </div>
            );

            if (!user) {
                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-8 space-y-8">
                        <div className="bg-indigo-600 w-24 h-24 rounded-[3rem] flex items-center justify-center text-white shadow-2xl">
                            <Icon name="flame" size={48} />
                        </div>
                        <div className="text-center">
                            <h1 className="text-5xl font-black text-gray-900 tracking-tighter">Funny Fitness</h1>
                            <p className="text-gray-400 font-bold uppercase text-[10px] tracking-[0.2em] mt-2">Movimiento en Familia</p>
                        </div>
                        <button 
                            onClick={() => setUser({ id: 'test' })}
                            className="w-full bg-indigo-600 text-white py-5 rounded-3xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-transform"
                        >
                            Comenzar Reto
                        </button>
                    </div>
                );
            }

            return (
                <div className="flex-1 flex flex-col h-full relative">
                    <header className="px-8 py-5 flex justify-between items-center bg-white border-b border-gray-50 shrink-0">
                        <div>
                            <h1 className="text-xl font-black text-gray-900 truncate">{groupName}</h1>
                            <p className="text-[10px] text-green-500 font-black uppercase flex items-center tracking-widest">
                                <span className="w-1.5 h-1.5 bg-green-500 rounded-full mr-2 animate-pulse"></span> Activo
                            </p>
                        </div>
                        <button className="p-2.5 bg-gray-50 rounded-2xl text-gray-400"><Icon name="bell" size={20}/></button>
                    </header>

                    <main className="flex-1 overflow-y-auto pb-32 bg-gray-50/50">
                        {activeTab === 'ranking' ? renderRanking() : renderSettings()}
                    </main>

                    {showQuickActions && (
                        <div className="absolute inset-0 z-50 flex items-end justify-center px-4 pb-32">
                            <div className="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" onClick={() => setShowQuickActions(false)}></div>
                            <div className="bg-white w-full rounded-[2.5rem] p-8 relative z-10 shadow-2xl animate-bounce-short">
                                <h3 className="text-xl font-black text-gray-900 mb-6 text-center">Acciones Rápidas</h3>
                                <div className="grid grid-cols-3 gap-3">
                                    <button onClick={handleSync} className="flex flex-col items-center p-4 bg-indigo-50 rounded-3xl space-y-2">
                                        <div className={`p-3 bg-indigo-600 text-white rounded-2xl ${isSyncing ? 'animate-spin' : ''}`}><Icon name="refresh-cw" size={20}/></div>
                                        <span className="text-[9px] font-black text-indigo-600 uppercase">Sinc</span>
                                    </button>
                                    <button className="flex flex-col items-center p-4 bg-orange-50 rounded-3xl space-y-2">
                                        <div className="p-3 bg-orange-500 text-white rounded-2xl"><Icon name="send" size={20}/></div>
                                        <span className="text-[9px] font-black text-orange-600 uppercase">Piqué</span>
                                    </button>
                                    <button onClick={() => setShowInviteModal(true)} className="flex flex-col items-center p-4 bg-green-50 rounded-3xl space-y-2">
                                        <div className="p-3 bg-green-600 text-white rounded-2xl"><Icon name="user-plus" size={20}/></div>
                                        <span className="text-[9px] font-black text-green-600 uppercase">Invitar</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="absolute bottom-8 left-1/2 -translate-x-1/2 w-[85%] bg-gray-900 rounded-[2.5rem] py-5 px-10 shadow-2xl flex justify-between items-center z-30">
                        <button onClick={() => setActiveTab('ranking')} className={`flex flex-col items-center ${activeTab === 'ranking' ? 'text-indigo-400' : 'text-gray-500'}`}>
                            <Icon name="trophy" size={24} />
                            <span className="text-[9px] font-black uppercase mt-1">Ranking</span>
                        </button>
                        <div className="relative">
                            <div className="absolute -top-16 left-1/2 -translate-x-1/2 bg-white p-1.5 rounded-full">
                                <button onClick={() => setShowQuickActions(true)} className="bg-indigo-600 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform"><Icon name="flame" size={28} /></button>
                            </div>
                        </div>
                        <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center ${activeTab === 'settings' ? 'text-indigo-400' : 'text-gray-500'}`}>
                            <Icon name="settings" size={24} />
                            <span className="text-[9px] font-black uppercase mt-1">Ajustes</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
